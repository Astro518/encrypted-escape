<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | Encrypted Escape Event</title>
  <link rel="stylesheet" href="/static/styles.css">
  <style>
    body {
      font-family: 'Arial', sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #007BFF, #00D4FF);
      color: #ffffff;
    }

    header {
      background: rgba(0, 0, 0, 0.7);
      text-align: center;
      padding: 20px;
    }

    header h1 {
      font-size: 2.5rem;
      margin: 0;
      color: #FFD700;
      text-shadow: 2px 2px #000;
    }

    .dashboard-container {
      max-width: 1200px;
      margin: 30px auto;
      padding: 20px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.3);
    }

    .dashboard-container h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #FFD700;
    }

    .progress-list, .solver-inputs {
      margin-top: 20px;
    }

    .team-card {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      padding: 15px;
      margin: 10px;
      box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.2);
    }

    .solver-inputs form {
      display: flex;
      flex-direction: column;
      margin: 20px 0;
    }

    .solver-inputs label {
      font-size: 1rem;
      margin-bottom: 5px;
    }

    .solver-inputs input, button {
      padding: 10px;
      margin-bottom: 10px;
      font-size: 1rem;
    }

    button {
      background-color: #FFD700;
      border: none;
      cursor: pointer;
      color: #000;
      border-radius: 5px;
      font-weight: bold;
    }

    button:hover {
      background-color: #FFC107;
    }

    footer {
      text-align: center;
      font-size: 0.9rem;
      margin-top: 30px;
      padding: 10px;
      background: rgba(0, 0, 0, 0.7);
      color: #FFD700;
    }
  </style>
</head>
<body>
  <header>
    <h1>Team Progress Dashboard</h1>
  </header>
  <div class="dashboard-container">
    <h2>Current Progress</h2>
    <div class="progress-list" id="progress-list">
      <!-- Cards will be dynamically updated -->
    </div>

    <h2>Enter Solver Solutions</h2>
    <div class="solver-inputs">
      <form id="solver1-form">
        <label for="solver1-solution">Solver 1 Solution:</label>
        <input type="text" id="solver1-solution" placeholder="Enter solution for Solver 1" required>
        <button type="submit">Submit Solver 1</button>
      </form>
      <form id="solver2-form">
        <label for="solver2-solution">Solver 2 Solution:</label>
        <input type="text" id="solver2-solution" placeholder="Enter solution for Solver 2" required>
        <button type="submit">Submit Solver 2</button>
      </form>
    </div>
  </div>
  <footer>
    <p>© 2025 Encrypted Escape Event | Progress Tracker</p>
  </footer>

  <script>
    // Fetch current progress and update the dashboard
    fetch("/progress")
      .then(res => res.json())
      .then(data => {
        const progressList = document.getElementById("progress-list");
        progressList.innerHTML = "";
        Object.keys(data).forEach(key => {
          const card = document.createElement("div");
          card.className = "team-card";
          card.innerHTML = `<h3>${key}</h3><p>${data[key]}</p>`;
          progressList.appendChild(card);
        });
      })
      .catch(err => console.error("Error fetching progress:", err));

    // Handle Solver 1 Form Submission
    document.getElementById("solver1-form").addEventListener("submit", function (e) {
      e.preventDefault();
      const solution = document.getElementById("solver1-solution").value;
      fetch("/solver", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ solver: "Solver 1", solution: solution })
      })
        .then(res => res.json())
        .then(data => {
          alert(data.message);
          location.reload(); // Refresh progress
        })
        .catch(err => console.error("Error:", err));
    });

    // Handle Solver 2 Form Submission
    document.getElementById("solver2-form").addEventListener("submit", function (e) {
      e.preventDefault();
      const solution = document.getElementById("solver2-solution").value;
      fetch("/solver", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ solver: "Solver 2", solution: solution })
      })
        .then(res => res.json())
        .then(data => {
          alert(data.message);
          location.reload(); // Refresh progress
        })
        .catch(err => console.error("Error:", err));
    });
  </script>
</body>
</html>
